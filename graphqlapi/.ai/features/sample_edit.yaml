# 💡 基本となる変数を定義
DOMAIN_NAME: "UserProfile"
DOMAIN_NAME_LOWER: "user_profile"
DOMAIN_NAME_URL: "user-profiles"
DOMAIN_NAME_UPPER: "USER_PROFILE"
FUNCTION_NAME: "ユーザープロフィール編集"
OPERATION_TYPE: "Edit"
RESOLVER_METHOD_NAME: "userProfile"

SCHEMA_REFERENCE: "prisma/schema.prisma 内の `{{DOMAIN_NAME}}` モデルを参照すること"

FRONTEND_FIELDS_SPEC: |
  - 性別: `gender`
  - 身長: `height`
  - 誕生日: `birthday`

BUSINESS_LOGIC_DETAILS: |
  1. 対象のユーザープロフィールが存在しない場合は、NotFoundエラーを返却すること。

FRONTEND_UI_SPEC:
  target_crud_structure: |
    app/(protected)/{{DOMAIN_NAME_URL}}/
    ├── [id]
    │   ├── edit
    │   │   ├── {{DOMAIN_NAME}}Form.tsx  # 編集用サブコンポーネント
    │   │   └── page.tsx                 # 編集画面
    │   └── page.tsx                     # 詳細画面
    ├── create
    │   └── page.tsx                     # 新規作成画面
    └── page.tsx                         # 一覧画面
  target_path_mapping:
    List: "app/(protected)/{{DOMAIN_NAME_URL}}/page.tsx"
    Create: "app/(protected)/{{DOMAIN_NAME_URL}}/create/page.tsx"
    Show: "app/(protected)/{{DOMAIN_NAME_URL}}/[id]/page.tsx"
    Edit: "app/(protected)/{{DOMAIN_NAME_URL}}/[id]/edit/page.tsx"
  design_base_file: "app/(protected)/(admin)/nutrients/page.tsx"
  theme:
    color_scale: "blue (focus:ring-blue-500, bg-blue-100, text-blue-600, bg-blue-600, hover:bg-blue-700)"
    icon: "Scale"
  page_title: "プロフィール"
  display_fields:
    - label: "性別"
      db_field: "gender"
      display_type: "text"
      placeholder_if_null: "未設定"
    - label: "身長"
      db_field: "height"
      display_type: "number"
      suffix: " cm"
    - label: "誕生日"
      db_field: "birthday"
      display_type: "date"
    - label: "年齢"
      db_field: "custom_logic"
      display_type: "text"
      suffix: " 歳"

  implementation_notes: |
    1. 既存の `NutrientAdminPage` の入力フォーム構造、Validation、およびエラーハンドリングの設計を踏襲すること。
    2. ターゲットパスに配置し、URLパラメータから `id` を取得して既存データを初期値としてフォームにロードする設計にすること。
    3. 初期ステートの型定義や GraphQL の Mutation/Query 呼び出し（`UPDATE_{{DOMAIN_NAME_UPPER}}` / `GET_{{DOMAIN_NAME_UPPER}}`）は、生成された `@/frontend/generated/graphql` の最新の型（`Update{{DOMAIN_NAME}}Mutation`等）に厳密に合わせること。
